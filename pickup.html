<!DOCTYPE html>
<html>
<head>
  <title>Pickup List</title>
  <style>
    table, th, td { border:1px solid black; border-collapse: collapse; padding: 8px; }
    th { background-color: #f2f2f2; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>Pickup List</h2>
<table>
  <thead>
    <tr>
      <th>Hotel</th>
      <th>Food</th>
      <th>Quantity</th>
      <th>Location</th>
      <th>Time</th>
      <th>NGO</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="pickupTable"></tbody>
</table>

<script>
function showPickups() {
  let foods = JSON.parse(localStorage.getItem("foods")) || [];
  let table = document.getElementById("pickupTable");
  table.innerHTML = "";
  foods.forEach((food, index) => {
    if(food.claimed) {
      table.innerHTML += `
        <tr>
          <td>${food.hotelName}</td>
          <td>${food.foodName}</td>
          <td>${food.quantity}</td>
          <td>${food.location}</td>
          <td>${food.time}</td>
          <td>${food.ngo}</td>
          <td>Pickup Pending</td>
          <td><button onclick="completePickup(${index})">Complete Pickup</button></td>
        </tr>
      `;
    }
  });
}

function completePickup(index) {
  let foods = JSON.parse(localStorage.getItem("foods")) || [];
  foods.splice(index,1);
  localStorage.setItem("foods", JSON.stringify(foods));
  alert("Pickup Completed!");
  showPickups();
}

showPickups();
</script>

</body>
</html>
